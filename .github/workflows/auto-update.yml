name: Daily Horoscope Generator

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate_horoscope:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate Horoscope JSON
        env:
          OPENROUTER_KEY: ${{ secrets.OPENNNROUTERAIPAPI }}
        run: |
          # Check if secret exists
          if [ -z "$OPENROUTER_KEY" ]; then
            echo "ERROR: Secret OPENNNROUTERAIPAPI is not set!"
            exit 1
          fi
          
          ZODIACS=("Aries" "Taurus" "Gemini" "Cancer" "Leo" "Virgo" "Libra" "Scorpio" "Sagittarius" "Capricorn" "Aquarius" "Pisces")
          
          TEMP_FILE=$(mktemp)
          echo "[" > "$TEMP_FILE"
          
          for SIGN in "${ZODIACS[@]}"; do
            echo "Fetching horoscope for $SIGN..."
            
            # Add delay to respect rate limit (20 requests per minute = 3 seconds between requests)
            if [ "$SIGN" != "Aries" ]; then
              sleep 3
            fi
            
            RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENROUTER_KEY" \
              -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
              -H "X-Title: Snapchat Horoscope Generator" \
              -d "{
                \"model\": \"google/gemini-flash-1.5:free\",
                \"messages\": [
                  {\"role\": \"system\", \"content\": \"You are an expert astrologer. Keep horoscopes under 50 words.\"},
                  {\"role\": \"user\", \"content\": \"Give me a horoscope for $SIGN for today. Be specific and inspiring.\"}
                ],
                \"temperature\": 0.7,
                \"max_tokens\": 100
              }" 2>&1)
            
            # Check if response is valid JSON
            if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
              echo "Invalid JSON response for $SIGN: $RESPONSE"
              TEXT="The stars align for $SIGN! Trust your intuition today as cosmic energies favor bold decisions."
            else
              # Check for API errors
              ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
              if [ -n "$ERROR" ]; then
                echo "API Error for $SIGN: $ERROR"
                TEXT="The stars align for $SIGN! Trust your intuition today as cosmic energies favor bold decisions."
              else
                TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
                if [ -z "$TEXT" ] || [ "$TEXT" == "null" ]; then
                  echo "Empty content for $SIGN"
                  TEXT="The stars align for $SIGN! Trust your intuition today as cosmic energies favor bold decisions."
                fi
              fi
            fi
            
            # Clean text for JSON
            TEXT=$(echo "$TEXT" | sed 's/"/\\"/g' | tr -d '\n\r' | sed 's/  */ /g')
            
            echo "  {\"sign\":\"$SIGN\",\"horoscope\":\"$TEXT\"}," >> "$TEMP_FILE"
          done
          
          sed -i '$ s/,$//' "$TEMP_FILE"
          echo "]" >> "$TEMP_FILE"
          mv "$TEMP_FILE" horoscope.json
          
          echo "Final horoscope.json:"
          cat horoscope.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add horoscope.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "Daily horoscope update - $(date -u +%Y-%m-%d)"
          
          for i in {1..3}; do
            git pull --rebase origin main && git push origin main && break
            echo "Retrying push... ($i/3)"
            sleep 2
          done
