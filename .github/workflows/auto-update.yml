name: Daily Horoscope Generator

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate_horoscope:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate Horoscope JSON
        env:
          OPENROUTER_KEY: ${{ secrets.OPENNNROUTERAIPAPI }}  # Use your actual secret name
        run: |
          # Debug: Check if secret is set (masked in logs)
          if [ -z "$OPENROUTER_KEY" ]; then
            echo "ERROR: OPENROUTER_KEY is not set!"
            exit 1
          fi
          echo "Secret is set (length: ${#OPENROUTER_KEY})"
          
          ZODIACS=("Aries" "Taurus" "Gemini" "Cancer" "Leo" "Virgo" "Libra" "Scorpio" "Sagittarius" "Capricorn" "Aquarius" "Pisces")
          
          TEMP_FILE=$(mktemp)
          echo "[" > "$TEMP_FILE"
          
          for SIGN in "${ZODIACS[@]}"; do
            echo "Fetching horoscope for $SIGN..."
            
            # Make request and capture both stdout and stderr
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENROUTER_KEY" \
              -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
              -H "X-Title: Snapchat Horoscope Generator" \
              -d "{
                \"model\": \"meta-llama/llama-3.1-8b-instruct:free\",
                \"messages\": [
                  {\"role\": \"system\", \"content\": \"You are an expert astrologer. Keep horoscopes under 100 words.\"},
                  {\"role\": \"user\", \"content\": \"Give me a horoscope for $SIGN for today, $(date +%B\ %d). Be specific and inspiring.\"}
                ],
                \"temperature\": 0.7,
                \"max_tokens\": 150
              }" 2>&1)
            
            HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
            HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
            
            echo "HTTP Status: $HTTP_STATUS"
            
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "API Error for $SIGN: $HTTP_BODY"
              TEXT="The stars are aligning for $SIGN today, but the cosmic connection is fuzzy. Check back later!"
            else
              TEXT=$(echo "$HTTP_BODY" | jq -r '.choices[0].message.content // empty')
              if [ -z "$TEXT" ]; then
                echo "Empty response for $SIGN: $HTTP_BODY"
                TEXT="The cosmic energies for $SIGN are mysterious today. Trust your intuition!"
              fi
            fi
            
            # Clean text for JSON
            TEXT=$(echo "$TEXT" | sed 's/"/\\"/g' | tr -d '\n\r' | sed 's/  */ /g')
            
            echo "  {\"sign\":\"$SIGN\",\"horoscope\":\"$TEXT\"}," >> "$TEMP_FILE"
            sleep 1  # Rate limiting
          done
          
          sed -i '$ s/,$//' "$TEMP_FILE"
          echo "]" >> "$TEMP_FILE"
          mv "$TEMP_FILE" horoscope.json
          
          echo "Generated horoscope.json:"
          cat horoscope.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add horoscope.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "Daily horoscope update - $(date -u +%Y-%m-%d)"
          
          for i in {1..3}; do
            git pull --rebase origin main && git push origin main && break
            echo "Retrying push... ($i/3)"
            sleep 2
          done
