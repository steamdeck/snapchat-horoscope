name: Daily Horoscope Generator

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate_horoscope:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate Horoscope JSON
        env:
          OPENROUTER_KEY: ${{ secrets.OPENNNROUTERAIPAPI }}
        run: |
          echo "Generating horoscopes via OpenRouter API..."
          
          # Single API call to generate all 12 horoscopes
          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: Snapchat Horoscope Generator" \
            -d "{
              \"model\": \"google/gemini-flash-1.5:free\",
              \"messages\": [
                {
                  \"role\": \"system\", 
                  \"content\": \"You are an expert astrologer. Generate today's horoscope for all 12 zodiac signs. Return ONLY a valid JSON array with this exact format: [{\\\"sign\\\":\\\"Aries\\\",\\\"horoscope\\\":\\\"...\\\"},...]. Each horoscope should be 1-2 sentences, specific and inspiring. Include all signs: Aries, Taurus, Gemini, Cancer, Leo, Virgo, Libra, Scorpio, Sagittarius, Capricorn, Aquarius, Pisces.\"
                },
                {
                  \"role\": \"user\", 
                  \"content\": \"Generate today's horoscopes for all 12 zodiac signs as a JSON array.\"
                }
              ],
              \"temperature\": 0.8,
              \"max_tokens\": 2000
            }")
          
          echo "Raw API Response:"
          echo "$RESPONSE" | jq .
          
          # Extract the content
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          
          if [ -z "$CONTENT" ] || [ "$CONTENT" == "null" ]; then
            echo "ERROR: Empty response from API"
            echo "Full response: $RESPONSE"
            exit 1
          fi
          
          # Clean up the content (remove markdown code blocks if present)
          CLEAN_CONTENT=$(echo "$CONTENT" | sed 's/```json//g' | sed 's/```//g' | sed 's/^ *//g')
          
          echo "Cleaned content:"
          echo "$CLEAN_CONTENT"
          
          # Validate JSON and save
          if echo "$CLEAN_CONTENT" | jq . > /dev/null 2>&1; then
            echo "$CLEAN_CONTENT" | jq . > horoscope.json
            echo "Successfully generated horoscope.json:"
            cat horoscope.json
          else
            echo "ERROR: Invalid JSON received"
            echo "Attempting to parse anyway..."
            echo "$CLEAN_CONTENT" > horoscope.json.raw
            
            # Fallback: create valid JSON with error message
            echo '[{"sign":"Error","horoscope":"Failed to generate horoscopes. Please check API response."}]' > horoscope.json
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add horoscope.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "Daily horoscope update - $(date -u +%Y-%m-%d)"
          
          for i in {1..3}; do
            git pull --rebase origin main && git push origin main && break
            echo "Retrying push... ($i/3)"
            sleep 2
          done
