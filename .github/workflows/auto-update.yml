name: Daily Horoscope Generator

on:
  schedule:
    # Runs at 00:00 US Eastern Time (UTC-5/UTC-4 depending on DST)
    - cron: '0 5 * * *' # 00:00 Eastern = 05:00 UTC
  workflow_dispatch:     # Manual trigger option

jobs:
  generate_horoscope:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate Horoscope JSON
        run: |
          echo "Generating horoscope..."
          ZODIACS=("Aries" "Taurus" "Gemini" "Cancer" "Leo" "Virgo" "Libra" "Scorpio" "Sagittarius" "Capricorn" "Aquarius" "Pisces")
          echo "[" > horoscope.json

          for SIGN in "${ZODIACS[@]}"; do
            RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.API_KEY }}" \
              -d "{
                    \"model\": \"arcee-ai/trinity-large-preview:free\",
                    \"messages\": [
                        {\"role\": \"system\", \"content\": \"You are an expert astrologer.\"},
                        {\"role\": \"user\", \"content\": \"Give me a horoscope for today for the zodiac sign: $SIGN in one short paragraph.\"}
                    ],
                    \"temperature\": 0.7
                  }")

            # Extract generated text safely
            TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

            # Fallback if empty
            if [ -z "$TEXT" ] || [ "$TEXT" == "null" ]; then
              TEXT="No horoscope available today."
            fi

            # Escape quotes for JSON
            TEXT=$(echo "$TEXT" | sed 's/"/\\"/g')

            # Append to JSON
            echo "{\"sign\":\"$SIGN\",\"horoscope\":\"$TEXT\"}," >> horoscope.json
          done

          # Remove trailing comma and close JSON array
          sed -i '$ s/,$//' horoscope.json
          echo "]" >> horoscope.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add horoscope.json

          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Daily horoscope update"

            # Pull remote changes first to prevent push rejection
            git pull --rebase origin main

            # Push the changes
            git push origin main
          else
            echo "No changes to commit."
          fi
